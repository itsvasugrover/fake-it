name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # needed to create the GitHub Release and upload assets

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary: fake-it
            artifact: fake-it-linux-x86_64
          - os: macos-13 # Intel runner
            binary: fake-it
            artifact: fake-it-macos-x86_64
          - os: macos-latest # Apple Silicon (M-series)
            binary: fake-it
            artifact: fake-it-macos-arm64
          - os: windows-latest
            binary: fake-it.exe
            artifact: fake-it-windows-x86_64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan
        run: pip install "conan>=2.0"

      # Install MinGW on Windows so Conan detects gcc (not MSVC).
      # This ensures Conan generates conanbuild.sh and uses the same
      # cmake_layout paths as Linux/macOS.
      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        uses: egor-tensin/setup-mingw@v4
        with:
          platform: x64

      - name: Detect Conan profile
        run: conan profile detect --force

      # Conan may still detect MSVC on windows-latest even after MinGW
      # is in PATH. Overwrite the profile to force MinGW/gcc explicitly.
      - name: Override Conan profile for MinGW (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          GCC_VER=$(gcc -dumpversion | cut -d. -f1)
          printf '[settings]\nos=Windows\narch=x86_64\ncompiler=gcc\ncompiler.version=%s\ncompiler.libcxx=libstdc++11\nbuild_type=Release\n[buildenv]\nCC=gcc\nCXX=g++\n' "$GCC_VER" > ~/.conan2/profiles/default

      - name: Install dependencies
        run: conan install . --build=missing -s build_type=Release

      - name: Configure & build
        shell: bash
        run: |
          source build/Release/generators/conanbuild.sh
          cmake --preset conan-release
          cmake --build build/Release --config Release

      - name: Stage artifact
        shell: bash
        run: cp "build/Release/${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
